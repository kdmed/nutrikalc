<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NutriKalc — Évaluation nutritionnelle OMS</title>
<meta name="description" content="Évaluation nutritionnelle pédiatrique selon les normes OMS, 0 à 5 ans">
<meta name="theme-color" content="#0D2B4E">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
:root{
  --navy:#0D2B4E;
  --navy-mid:#1A3F6F;
  --teal:#1D9E75;
  --teal-light:#E1F5EE;
  --teal-mid:#0F6E56;
  --bg:#F7F9FB;
  --card:#FFFFFF;
  --border:#E3E8EE;
  --border-light:#EDF1F5;
  --text:#0F1B2A;
  --text-secondary:#5B6B7E;
  --text-tertiary:#8C99A8;
  --danger-bg:#FCEBEB;
  --danger-text:#501313;
  --danger-text-strong:#791F1F;
  --warn-bg:#FAEEDA;
  --warn-text:#633806;
  --warn-text-strong:#854F0B;
  --info-bg:#E6F1FB;
  --info-text:#042C53;
  --radius-lg:14px;
  --radius-md:10px;
  --shadow:0 1px 2px rgba(13,43,78,0.04), 0 1px 12px rgba(13,43,78,0.04);
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

body{
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}

.app{max-width:680px;margin:0 auto;padding:1rem 1rem 3rem}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);
  border-radius:var(--radius-lg);
  padding:1.5rem 1.5rem;
  margin-bottom:1.25rem;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:var(--shadow);
}
.header-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.header-icon svg{width:26px;height:26px;stroke:#fff}
.header h1{color:#fff;font-size:21px;font-weight:600;letter-spacing:-0.3px}
.header p{color:rgba(255,255,255,0.62);font-size:13px;margin-top:2px}

/* CARDS */
.form-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:1.35rem 1.5rem;
  margin-bottom:1rem;
  box-shadow:var(--shadow);
}
.form-card h2{
  font-size:11.5px;font-weight:600;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1.1rem;
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13.5px;color:var(--text-secondary);font-weight:500}
.field label .opt{font-size:11px;color:var(--text-tertiary);font-weight:400}

.field input{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-md);
  font-size:16px;
  background:var(--card);
  color:var(--text);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
  -webkit-appearance:none;
}
.field input:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(29,158,117,0.13);
}
.field input::placeholder{color:var(--text-tertiary)}

.unit{font-size:11.5px;color:var(--text-tertiary)}

/* TOGGLES */
.toggle-row{display:flex;gap:8px}
.tog-btn{
  flex:1;padding:10px 10px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-md);
  background:transparent;
  color:var(--text-secondary);
  font-size:14px;font-weight:500;
  cursor:pointer;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:inherit;
}
.tog-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.tog-btn svg{width:16px;height:16px}

.taille-hint{
  display:none;margin-top:2px;padding:8px 11px;border-radius:8px;
  font-size:12.5px;background:var(--teal-light);color:var(--teal-mid);
  align-items:flex-start;gap:7px;line-height:1.4;
}
.taille-hint.show{display:flex}
.taille-hint svg{width:15px;height:15px;flex-shrink:0;margin-top:1px}

/* BUTTON */
.calc-btn{
  width:100%;padding:14px;
  background:var(--teal);color:#fff;
  border:none;border-radius:var(--radius-md);
  font-size:16px;font-weight:600;
  cursor:pointer;margin-top:0.5rem;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s, transform .1s;
  font-family:inherit;
}
.calc-btn:active{transform:scale(0.98)}
.calc-btn svg{width:18px;height:18px}

.error-msg{
  color:#A32D2D;font-size:13px;margin-top:10px;
  display:none;align-items:center;gap:6px;
}
.error-msg svg{width:15px;height:15px;flex-shrink:0}

/* RESULTS */
.results{display:none;margin-top:0.5rem}
.divider{height:1px;background:var(--border);margin:1.5rem 0}

.result-header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);
  border-radius:var(--radius-lg);
  padding:1.1rem 1.5rem;margin-bottom:1rem;color:#fff;
  box-shadow:var(--shadow);
}
.patient-line{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:4px}
.summary-line{font-size:17px;font-weight:600}

.indicator{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:1.1rem 1.35rem;margin-bottom:10px;
  box-shadow:var(--shadow);
}
.ind-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ind-name{
  font-size:11.5px;color:var(--text-tertiary);font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;
}
.ind-val{font-size:23px;font-weight:600;color:var(--text);line-height:1}
.ind-val .ind-unit{font-size:13px;font-weight:400;color:var(--text-tertiary);margin-left:3px}
.ind-sub{font-size:11.5px;color:var(--text-tertiary);margin-top:4px}

.ind-badges{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.badge{
  display:inline-block;padding:4px 11px;border-radius:20px;
  font-size:12px;font-weight:600;white-space:nowrap;
}
.badge.normal{background:var(--teal-light);color:#085041}
.badge.mam{background:var(--warn-bg);color:var(--warn-text)}
.badge.mas{background:var(--danger-bg);color:var(--danger-text)}
.badge.surp{background:var(--info-bg);color:var(--info-text)}
.badge.aigue{background:var(--danger-bg);color:var(--danger-text-strong);font-size:11px;font-weight:500}
.badge.chronique{background:var(--warn-bg);color:var(--warn-text-strong);font-size:11px;font-weight:500}

.zscore-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.zbar{flex:1;height:7px;border-radius:4px;background:var(--border-light);overflow:hidden}
.zbar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.zscore-val{font-size:12.5px;color:var(--text-secondary);min-width:68px;text-align:right;font-weight:500}

.diag-block{
  background:#F4F6F9;border-radius:var(--radius-md);
  padding:9px 13px;margin-top:9px;
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
}
.diag-label{font-size:12px;color:var(--text-tertiary)}

.interp-card{border-radius:var(--radius-lg);padding:1.35rem 1.5rem;margin-bottom:1rem}
.interp-card.normal{background:var(--teal-light);border-left:4px solid var(--teal)}
.interp-card.mam{background:var(--warn-bg);border-left:4px solid #EF9F27}
.interp-card.mas{background:var(--danger-bg);border-left:4px solid #E24B4A}
.interp-card h3{font-size:13.5px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.interp-card h3 svg{width:16px;height:16px}
.interp-card.normal h3{color:var(--teal-mid)}
.interp-card.mam h3{color:var(--warn-text)}
.interp-card.mas h3{color:var(--danger-text)}
.interp-card p{font-size:14.5px;line-height:1.65}
.interp-card.normal p{color:#085041}
.interp-card.mam p{color:var(--warn-text)}
.interp-card.mas p{color:#4A1B0C}

.reset-btn{
  width:100%;padding:11px;background:transparent;
  border:1.5px solid var(--border);border-radius:var(--radius-md);
  font-size:14px;color:var(--text-secondary);cursor:pointer;
  margin-top:6px;font-family:inherit;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.reset-btn:active{background:var(--border-light)}
.reset-btn svg{width:15px;height:15px}

/* Install banner */
.install-banner{
  display:none;
  background:var(--card);border:1.5px solid var(--teal);
  border-radius:var(--radius-lg);padding:1rem 1.25rem;
  margin-bottom:1rem;align-items:center;gap:12px;
  box-shadow:var(--shadow);
}
.install-banner.show{display:flex}
.install-banner-icon{
  width:38px;height:38px;border-radius:10px;background:var(--teal-light);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.install-banner-icon svg{width:20px;height:20px;color:var(--teal-mid)}
.install-banner-text{flex:1}
.install-banner-text strong{font-size:13.5px;display:block;color:var(--text)}
.install-banner-text span{font-size:12px;color:var(--text-tertiary)}
.install-banner-btn{
  background:var(--teal);color:#fff;border:none;border-radius:8px;
  padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;flex-shrink:0;
}

footer{
  text-align:center;padding:1rem;font-size:11.5px;color:var(--text-tertiary);
}

@media (max-width:380px){
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-3 .field:nth-child(2){grid-column:1/3}
}
</style>
</head>
<body>

<div class="app">

  <div class="install-banner" id="install-banner">
    <div class="install-banner-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
    </div>
    <div class="install-banner-text">
      <strong>Installer NutriKalc</strong>
      <span>Accès rapide, fonctionne hors-ligne</span>
    </div>
    <button class="install-banner-btn" id="install-btn">Installer</button>
  </div>

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <div>
      <h1>NutriKalc</h1>
      <p>Évaluation nutritionnelle OMS · 0 – 5 ans</p>
    </div>
  </div>

  <div class="form-card">
    <h2>Identité</h2>
    <div class="grid-2">
      <div class="field">
        <label>Âge</label>
        <input type="number" id="age-mois" placeholder="ex. 18" min="0" max="60" step="1" inputmode="numeric">
        <span class="unit">mois révolus (0 – 60)</span>
      </div>
      <div class="field">
        <label>Sexe</label>
        <div class="toggle-row">
          <button class="tog-btn active" id="btn-f" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M12 13v8M9 18h6" stroke-linecap="round"/></svg>
            Fille
          </button>
          <button class="tog-btn" id="btn-m" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="5"/><path d="M19 5l-5.4 5.4M19 5h-5M19 5v5"/></svg>
            Garçon
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="form-card">
    <h2>Mesures anthropométriques</h2>
    <div class="grid-3">
      <div class="field">
        <label>Poids</label>
        <input type="number" id="poids" placeholder="0.0" min="0.5" max="30" step="0.1" inputmode="decimal">
        <span class="unit">kilogrammes</span>
      </div>
      <div class="field" style="grid-column:2/4">
        <label>Taille <span class="opt" id="taille-mode-label"></span></label>
        <input type="number" id="taille" placeholder="0.0" min="40" max="125" step="0.1" inputmode="decimal">
        <span class="unit">centimètres</span>
      </div>
    </div>

    <div class="taille-hint" id="taille-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span id="taille-hint-text"></span>
    </div>

    <div class="field" style="margin-top:14px">
      <label>PB / MUAC <span class="opt">≥ 6 mois uniquement</span></label>
      <input type="number" id="muac" placeholder="optionnel" min="80" max="200" step="1" inputmode="numeric">
      <span class="unit">millimètres</span>
    </div>

    <div class="error-msg" id="err-msg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <span id="err-text"></span>
    </div>
  </div>

  <button class="calc-btn" id="calc-btn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h4M8 18h4"/></svg>
    Évaluer le statut nutritionnel
  </button>

  <div class="results" id="results">
    <div class="divider"></div>
    <div class="result-header">
      <div class="patient-line" id="res-patient"></div>
      <div class="summary-line" id="res-summary"></div>
    </div>

    <div id="indicators"></div>

    <div class="interp-card" id="interp-card">
      <h3 id="interp-title"></h3>
      <p id="interp-text"></p>
    </div>

    <button class="reset-btn" id="reset-btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Nouvelle évaluation
    </button>
  </div>

  <footer>NutriKalc · Normes OMS de croissance · Usage clinique d'aide à la décision</footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
